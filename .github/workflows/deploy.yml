# GitHub Pages — Next.js static export (output: "export")
# Settings → Pages → Build: GitHub Actions
#
# Next.js 16 puts the site in ./out (index.html at out root). basePath only affects
# URL prefixes in HTML, not a nested out/<basePath>/ folder.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Verify export output
        run: |
          test -f out/index.html || (echo "::error::out/index.html missing — build did not export" && exit 1)
          ls -la out | head -20

      # Fail the workflow if the static site folder is too large for your policy (adjust MAX_MB if needed).
      - name: Check deploy bundle size (max 50 MB)
        run: |
          MAX_MB=50
          BYTES=$(du -sb out | cut -f1)
          MB=$((BYTES / 1024 / 1024))
          echo "out/ size: ${MB} MB (${BYTES} bytes)"
          MAX_BYTES=$((MAX_MB * 1024 * 1024))
          if [ "$BYTES" -gt "$MAX_BYTES" ]; then
            echo "::error::out/ is larger than ${MAX_MB} MB. Compress images in public/images, avoid huge binaries, or raise MAX_MB in deploy.yml."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
